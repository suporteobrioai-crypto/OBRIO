project_id = "kvofxprsmzyxssjpyfmy"

[api]
enabled = true
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
major_version = 15

[auth]
enabled = true
site_url = "https://obrioai.app"
additional_redirect_urls = [
  "http://localhost:3000/**",
  "https://obrioai.app/**",
  "https://www.obrioai.app/**",
  "https://obrio-ai.obrioai.workers.dev/**"
]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Cadastro (/cadastro) usa signInWithOtp → template magic_link com {{ .Token }}
[auth.email.template.magic_link]
subject = "Bem-vindo ao Obrio AI — seu código de confirmação"
content_path = "./supabase/templates/magic-link.html"

[storage]
enabled = true
