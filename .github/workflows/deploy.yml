name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SITE_URL: https://obrioai.app
          NEXT_PUBLIC_SIGNUP_ENABLED: "false"

      - name: Deploy with OpenNext
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 3993b788758518b8ed046b055577f49d
          NEXT_PUBLIC_SITE_URL: https://obrioai.app
          NEXT_PUBLIC_SIGNUP_ENABLED: "false"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Verify production serves login (not landing)
        run: |
          html=$(curl -sfL "https://obrio-ai.obrioai.workers.dev/")
          echo "$html" | grep -q "hero-bg" && (echo "Landing page still deployed (hero-bg)" && exit 1)
          echo "$html" | grep -q "Controle sua obra sem planilhas" && (echo "Landing page still deployed (marketing copy)" && exit 1)
          echo "$html" | grep -q "favicon.svg" || (echo "Expected new app build with favicon" && exit 1)
          echo "Homepage verification passed (landing removed, login is client-rendered)"
